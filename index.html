<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeBalance 🌳 Joyful Carbon Awareness</title>
    <meta name="description" content="Track, reduce, and live mindfully. Calculator, daily tracker, and habit log for your carbon footprint.">
    <!-- Security Meta Tags -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!-- Navigation -->

            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="nav-brand" data-action="navigate" data-target="home">
                    <i data-lucide="leaf" class="brand-icon"></i>
                    <span>TreeBalance</span>
                </div>
                <label class="theme-switch">
                    <i data-lucide="moon" class="theme-icon-moon"></i>
                    <div class="toggle-slider-container">
                        <input type="checkbox" id="theme-toggle-header" data-action="toggle-theme">
                        <div class="toggle-thumb"></div>
                    </div>
                    <i data-lucide="sun" class="theme-icon-sun"></i>
                </label>
            </div>
            <div class="nav-links" style="display: none;"> <!-- Hidden by default until auth confirms -->

                <button class="nav-link" id="nav-calculator" data-action="navigate" data-target="calculator">Calculator</button>
                <button class="nav-link" id="nav-tracker" data-action="navigate" data-target="tracker">Footprint</button>
                <button class="nav-link" id="nav-ai" data-action="navigate" data-target="ai">
                    <i data-lucide="sparkles" class="ai-sparkle"></i> AI Insights
                </button>
                <button class="nav-link" id="nav-settings" data-action="navigate" data-target="settings">
                    <i data-lucide="settings" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i> Settings
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected here by app.js -->

    <!-- Profile Card Editor Modal -->
    <div id="profile-card-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div class="card fade-in-up" style="background: var(--surface); padding: 32px; border-radius: 24px; max-width: 400px; width: 90%; text-align: center; position: relative; border: 1px solid var(--border-glass);">
            <button onclick="closeProfileCardEditor()" style="position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-secondary); cursor: pointer;"><i data-lucide="x"></i></button>
            <h2 style="margin-top: 0; margin-bottom: 24px; color: var(--text-primary);">Your Profile Card</h2>
            
            <div id="card-preview-container" style="width: 260px; height: 420px; background: #f0f9ff; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 0 auto 24px auto; border: 4px solid var(--surface);">
                <h3 style="position: absolute; top: 24px; left: 0; right: 0; text-align: center; color: #1e293b; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; margin: 0; z-index: 2;">TREEBALANCE</h3>
                <img src="avatar.png" alt="Profile Avatar" style="width: 100%; height: 100%; object-fit: cover; position: absolute; bottom: 0; left: 0; z-index: 1;">
                <div style="position: absolute; bottom: 20px; left: 0; right: 0; z-index: 2; color: #1e293b; font-weight: bold; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); padding: 8px 0;">
                    <span id="preview-display-name">Eco Explorer</span>
                    <div style="font-size: 0.8rem; font-weight: normal; color: #475569;">Member since 2026</div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="primary-btn" onclick="alert('Profile Card link copied to clipboard!'); closeProfileCardEditor();" style="flex: 1; padding: 12px; border-radius: 30px; font-weight: 600;"><i data-lucide="share-2" style="width:18px; height:18px; vertical-align: middle; margin-right: 6px;"></i> Share</button>
                <button class="secondary-btn" onclick="alert('Downloading high-res Profile Card image...'); closeProfileCardEditor();" style="flex: 1; padding: 12px; border-radius: 30px; font-weight: 600; background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);"><i data-lucide="download" style="width:18px; height:18px; vertical-align: middle; margin-right: 6px;"></i> Download</button>
            </div>
        </div>
    </div>
